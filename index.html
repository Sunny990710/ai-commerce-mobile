// PriceTrackModal
// ═══════════════════════════════════════════════════════════

function PriceTrackModal({ product, onClose, onStartTracking }) {
  const [targetPrice, setTargetPrice] = useState(product.price * 0.8);
  const [agenticCheckout, setAgenticCheckout] = useState(true);
  const [activeTab, setActiveTab] = useState('TRACK'); // TRACK | TREND
  const pct = ((targetPrice - product.price * 0.5) / (product.price * 0.5)) * 100;

  // Generate mock trend data based on product price
  const baseP = product.price;
  const trendData = [
    { week: '1월 1주', price: Math.round(baseP * 1.12), rank: 8 },
    { week: '1월 2주', price: Math.round(baseP * 1.08), rank: 6 },
    { week: '1월 3주', price: Math.round(baseP * 1.05), rank: 5 },
    { week: '1월 4주', price: Math.round(baseP * 1.02), rank: 4 },
    { week: '2월 1주', price: Math.round(baseP * 1.0), rank: 3 },
    { week: '2월 2주', price: Math.round(baseP * 0.98), rank: 2 },
    { week: '2월 3주', price: Math.round(baseP * 0.95), rank: 1 },
    { week: '2월 4주', price: Math.round(baseP * 1.0), rank: 2 },
  ];
  const maxPrice = Math.max(...trendData.map(d => d.price));
  const minPrice = Math.min(...trendData.map(d => d.price));
  const maxRank = Math.max(...trendData.map(d => d.rank));
  const priceChange = trendData[trendData.length - 1].price - trendData[0].price;
  const priceChangePct = Math.round((priceChange / trendData[0].price) * 100);

  // SVG chart dimensions
  const chartW = 440, chartH = 200, padL = 50, padR = 30, padT = 20, padB = 40;
  const plotW = chartW - padL - padR, plotH = chartH - padT - padB;

  const priceToY = (p) => padT + plotH - ((p - minPrice) / (maxPrice - minPrice || 1)) * plotH;
  const rankToY = (r) => padT + ((r - 1) / (maxRank - 1 || 1)) * plotH;
  const idxToX = (i) => padL + (i / (trendData.length - 1)) * plotW;

  const pricePath = trendData.map((d, i) => `${i === 0 ? 'M' : 'L'}${idxToX(i)},${priceToY(d.price)}`).join(' ');
  const rankPath = trendData.map((d, i) => `${i === 0 ? 'M' : 'L'}${idxToX(i)},${rankToY(d.rank)}`).join(' ');

  return h('div', { className: 'fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md p-6', onClick: onClose },
    h('div', { className: 'w-full max-w-2xl bg-white rounded-[48px] p-10 shadow-2xl overflow-hidden relative animate-fadeIn max-h-[90vh] overflow-y-auto no-scrollbar', onClick: e => e.stopPropagation() },
      h('div', { className: 'absolute top-0 left-0 w-full h-3 bg-slate-900' }),
      // Header
      h('div', { className: 'flex justify-between items-center mb-8' },
        h('div', { className: 'flex items-center gap-4 text-slate-900' },
          h('div', { className: 'w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center' }, h(TrendingDown, { size: 24 })),
          h('div', null,
            h('h2', { className: 'text-2xl editorial-title' }, 'Price Intelligence'),
            h('p', { className: 'text-slate-400 text-xs font-medium' }, 'AI 기반 시장 모니터링 & 트렌드 분석')
          )
        ),
        h('button', { onClick: onClose, className: 'p-3 hover:bg-slate-50 rounded-full transition-colors' }, h(X, { size: 24, className: 'text-slate-400' }))
      ),
      // Product info
      h('div', { className: 'bg-slate-50 rounded-[24px] p-6 flex gap-6 mb-6 border border-slate-100' },
        h('img', { src: product.image, className: 'w-20 h-20 rounded-xl object-cover shadow-lg', referrerPolicy: 'no-referrer' }),
        h('div', { className: 'flex-1' },
          h('p', { className: 'text-[10px] text-blue-600 font-black uppercase tracking-widest mb-1' }, product.brand),
          h('h3', { className: 'text-lg font-bold text-slate-900 leading-tight mb-1' }, product.name),
          h('p', { className: 'text-sm text-slate-500 font-medium' }, '현재 시장가: ', h('span', { className: 'text-slate-900 font-black' }, fmt(product.price)))
        )
      ),
      // Tab switcher
      h('div', { className: 'flex bg-slate-100 rounded-2xl p-1 mb-6' },
        ...[
          { id: 'TRACK', label: '가격 추적', icon: Bell },
          { id: 'TREND', label: '추이 분석', icon: TrendingDown }
        ].map(tab =>
          h('button', {
            key: tab.id,
            onClick: () => setActiveTab(tab.id),
            className: `flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === tab.id ? 'bg-white text-slate-900 shadow-md' : 'text-slate-400 hover:text-slate-600'}`
          }, h(tab.icon, { size: 16 }), tab.label)
        )
      ),
      // ── TRACK TAB ──
      activeTab === 'TRACK' ? h('div', null,
        // Slider
        h('div', { className: 'mb-8' },
          h('div', { className: 'flex justify-between items-center mb-4' },
            h('span', { className: 'text-sm font-bold text-slate-900' }, '목표 구매가'),
            h('span', { className: 'bg-blue-50 text-blue-600 text-[10px] font-black px-3 py-1 rounded-full' }, 'AI 추천: ' + fmt(Math.round(product.price * 0.75)))
          ),
          h('div', { className: 'relative h-3 bg-slate-100 rounded-full mb-4' },
            h('div', { className: 'absolute h-full bg-slate-900 rounded-full transition-all duration-300', style: { width: `${Math.min(100, Math.max(0, pct))}%` } }),
            h('input', { type: 'range', min: product.price * 0.5, max: product.price, value: targetPrice, onChange: e => setTargetPrice(Number(e.target.value)), className: 'absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10' })
          ),
          h('div', { className: 'flex justify-between text-[10px] font-black text-slate-400' },
            h('span', null, fmt(Math.round(product.price * 0.5))),
            h('span', { className: 'text-slate-900 text-xl font-serif italic' }, fmt(Math.round(targetPrice))),
            h('span', null, fmt(product.price))
          )
        ),
        // Agentic checkout
        h('div', { className: 'bg-slate-900 rounded-[24px] p-6 flex items-start gap-4 mb-8 shadow-xl' },
          h('div', { className: 'bg-white/10 p-2.5 rounded-xl text-white' }, h(Sparkles, { size: 22 })),
          h('div', { className: 'flex-1' },
            h('div', { className: 'flex justify-between items-center mb-1.5' },
              h('h4', { className: 'text-base font-bold text-white' }, '자율 구매'),
              h('button', { onClick: () => setAgenticCheckout(!agenticCheckout), className: `w-12 h-6 rounded-full transition-all relative ${agenticCheckout ? 'bg-blue-600' : 'bg-white/20'}` },
                h('div', { className: `absolute top-0.5 w-5 h-5 bg-white rounded-full transition-all shadow-md ${agenticCheckout ? 'left-6' : 'left-0.5'}` })
              )
            ),
            h('p', { className: 'text-slate-400 text-xs leading-relaxed' }, '목표가 도달 시 AI가 자동 구매를 실행합니다.')
          )
        )
      ) : null,
      // ── TREND TAB ──
      activeTab === 'TREND' ? h('div', null,
        // Trend summary cards
        h('div', { className: 'grid grid-cols-3 gap-3 mb-6' },
          h('div', { className: 'bg-slate-50 rounded-2xl p-4 text-center border border-slate-100' },
            h('p', { className: 'text-[10px] text-slate-400 font-bold mb-1' }, '8주 최저가'),
            h('p', { className: 'text-lg font-black text-emerald-600' }, fmt(minPrice))
          ),
          h('div', { className: 'bg-slate-50 rounded-2xl p-4 text-center border border-slate-100' },
            h('p', { className: 'text-[10px] text-slate-400 font-bold mb-1' }, '가격 변동'),
            h('p', { className: `text-lg font-black ${priceChange <= 0 ? 'text-emerald-600' : 'text-rose-500'}` }, (priceChange <= 0 ? '▼ ' : '▲ ') + Math.abs(priceChangePct) + '%')
          ),
          h('div', { className: 'bg-slate-50 rounded-2xl p-4 text-center border border-slate-100' },
            h('p', { className: 'text-[10px] text-slate-400 font-bold mb-1' }, '현재 순위'),
            h('p', { className: 'text-lg font-black text-blue-600' }, trendData[trendData.length - 1].rank + '위')
          )
        ),
        // SVG Chart — dark theme
        h('div', { className: 'bg-slate-900 rounded-3xl p-6 mb-6 shadow-xl' },
          h('h4', { className: 'text-white font-bold text-sm mb-4' }, '추이 분석'),
          h('svg', { viewBox: `0 0 ${chartW} ${chartH}`, className: 'w-full', style: { height: '220px' } },
            // Grid lines
            ...[0, 0.25, 0.5, 0.75, 1].map(f => {
              const y = padT + plotH * (1 - f);
              return h('line', { key: 'g' + f, x1: padL, y1: y, x2: chartW - padR, y2: y, stroke: '#334155', strokeWidth: 0.5, strokeDasharray: f > 0 && f < 1 ? '4,4' : 'none' });
            }),
            // Y-axis labels (price)
            ...[0, 0.5, 1].map(f => {
              const val = Math.round(minPrice + (maxPrice - minPrice) * f);
              const y = padT + plotH * (1 - f);
              return h('text', { key: 'yp' + f, x: padL - 8, y: y + 4, textAnchor: 'end', fill: '#64748b', fontSize: 9, fontWeight: 600 }, (val / 1000).toFixed(0) + 'k');
            }),
            // Y-axis label right (rank)
            ...[1, Math.ceil(maxRank / 2), maxRank].map((r, i) => {
              const y = rankToY(r);
              return h('text', { key: 'yr' + i, x: chartW - padR + 8, y: y + 4, textAnchor: 'start', fill: '#4ade80', fontSize: 9, fontWeight: 600 }, r + '위');
            }),
            // X-axis labels
            ...trendData.map((d, i) => {
              const x = idxToX(i);
              return i % 2 === 0 ? h('text', { key: 'x' + i, x, y: chartH - 8, textAnchor: 'middle', fill: '#64748b', fontSize: 9, fontWeight: 600 }, d.week.replace('월 ', '/')) : null;

            ...trendData.map((d, i) =>

            ),
            // Rank line (green)
            h('path', { d: rankPath, fill: 'none', stroke: '#4ade80', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' }),

            ...trendData.map((d, i) =>
              h('circle', { key: 'rd' + i, cx: idxToX(i), cy: rankToY(d.rank), r: 4, fill: '#4ade80', stroke: '#1e293b', strokeWidth: 2 })

            h('text', { x: 8, y: chartH / 2, textAnchor: 'middle', fill: '#94a3b8', fontSize: 9, fontWeight: 700, transform: `rotate(-90, 8, ${chartH / 2})` }, '가격 (원)'),

          ),
          // Legend
          h('div', { className: 'flex justify-center gap-6 mt-3' },
            h('div', { className: 'flex items-center gap-2' },
              h('div', { className: 'w-3 h-3 rounded-full bg-blue-400' }),
              h('span', { className: 'text-[11px] text-blue-400 font-bold' }, '판매가격')
            ),
            h('div', { className: 'flex items-center gap-2' },
              h('div', { className: 'w-3 h-3 rounded-full bg-green-400' }),
              h('span', { className: 'text-[11px] text-green-400 font-bold' }, '순위')
            )
          )
        ),
        // AI insight
        h('div', { className: 'bg-blue-50 rounded-2xl p-5 border border-blue-100' },
          h('div', { className: 'flex items-center gap-2 mb-2' },
            h(Sparkles, { size: 14, className: 'text-blue-600' }),
            h('span', { className: 'text-xs font-black text-blue-600' }, 'AI 가격 인사이트')
          ),
          h('p', { className: 'text-[12px] text-slate-600 leading-relaxed' },
            priceChange <= 0
              ? `최근 8주간 가격이 ${Math.abs(priceChangePct)}% 하락했어요. 현재 ${fmt(trendData[trendData.length-1].price)}로 최근 최저가에 근접한 시점입니다. 지금이 구매 적기일 수 있어요!`
              : `최근 8주간 가격이 ${Math.abs(priceChangePct)}% 상승했어요. 인기 상승으로 가격이 오르는 추세입니다. 관심 가격을 설정해 놓으면 하락 시 알려드릴게요.`
          )
        )
      ) : null,
      // Buttons
      h('div', { className: 'flex gap-4 mt-6' },
        h('button', { onClick: onClose, className: 'flex-1 bg-slate-50 text-slate-400 font-bold py-4 rounded-[20px] hover:bg-slate-100 transition-all' }, '취소'),
        h('button', { onClick: onStartTracking, className: 'flex-[2] bg-slate-900 text-white font-bold py-4 rounded-[20px] flex items-center justify-center gap-3 shadow-2xl hover:bg-black transition-all' },
          h(Bell, { size: 20 }), activeTab === 'TRACK' ? '모니터링 활성화' : '가격 알림 설정'
        )
      )
    )
  );
}

      return base - benefits.reduce((s, b, i) => {

        return s + (b.type !== 'point' ? b.amount : 0);
      }, 0);

    h(SidebarNav, { active: view, onChange: setView }),
    h('main', { className: 'flex-1 relative' },
      h('div', { className: 'max-w-7xl mx-auto px-4 py-6' },
        h('div', { className: 'flex justify-end mb-6 relative z-40' },
          isLoggedIn
            ? h('div', { className: 'relative', ref: userMenuRef },
                h('div', { className: 'flex items-center gap-3' },
                  h('button', {
                    onClick: () => setView('WISHLIST'),
                    className: 'w-10 h-10 rounded-full border border-slate-200 bg-white text-slate-500 hover:text-slate-900 hover:border-slate-300 flex items-center justify-center transition-all'
                  }, h(Heart, { size: 18 })),
                  h('button', {
                    onClick: () => setShowUserMenu(prev => !prev),
                    className: 'w-10 h-10 rounded-full border border-slate-200 bg-white text-slate-500 hover:text-slate-900 hover:border-slate-300 flex items-center justify-center transition-all'
                  }, h(User, { size: 18 }))
                ),
                showUserMenu ? h('div', { className: 'absolute right-0 mt-3 w-64 bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden' },
                  h('div', { className: 'px-4 py-3 border-b border-slate-100' },
                    h('p', { className: 'text-xl font-black text-slate-900' }, displayName)
                  ),
                  h('button', {
                    onClick: () => { setView('WISHLIST'); setShowUserMenu(false); },
                    className: 'w-full px-4 py-3 text-left text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-3'
                  }, h(Heart, { size: 16, className: 'text-slate-400' }), '위시리스트'),
                  h('button', {
                    onClick: () => { setShowUserMenu(false); setView('MY'); },
                    className: 'w-full px-4 py-3 text-left text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-3'
                  }, h(Settings, { size: 16, className: 'text-slate-400' }), '프로필 설정'),
                  h('button', {
                    onClick: () => { setShowUserMenu(false); alert('피드백 페이지는 준비 중입니다.'); },
                    className: 'w-full px-4 py-3 text-left text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-3'
                  }, h(Send, { size: 16, className: 'text-slate-400' }), '피드백 보내기'),
                  h('div', { className: 'h-px bg-slate-100' }),
                  h('button', {
                    onClick: handleLogout,
                    className: 'w-full px-4 py-3 text-left text-sm text-violet-600 hover:bg-violet-50 flex items-center gap-3 font-medium'
                  }, h(LogOut, { size: 16 }), '로그아웃')
                ) : null
              )
            : h('button', {
                onClick: () => openAuthModal('LOGIN'),
                className: 'px-5 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-sm shadow-lg hover:bg-black transition-all flex items-center gap-2'
              }, h(LogIn, { size: 16 }), '로그인')
        ),
        view === 'HOME' ? renderHome() : null,
        view === 'SEARCH' ? renderSearch() : null,
        view === 'FEED' ? renderFeed() : null,
        view === 'WISHLIST' ? h('div', { className: 'p-12 text-center bg-white rounded-3xl shadow-soft animate-fadeIn' },
          h(Heart, { size: 48, className: 'mx-auto mb-4 text-slate-300' }),
          h('h2', { className: 'text-xl font-bold text-slate-900' }, '위시리스트'),
          h('p', { className: 'text-slate-500' }, '좋아하는 아이템들이 여기에 표시됩니다')
        ) : null,
        view === 'MY' ? (() => {
          const Section = ({ title, children }) => h('div', { className: 'mb-6' }, h('h3', { className: 'text-sm font-bold text-slate-900 mb-3' }, title), children);
          const Chip = ({ label, selected, onClick }) => h('button', { onClick, className: `px-4 py-2 rounded-xl text-[12px] font-bold border transition-all ${selected ? 'bg-slate-900 text-white border-slate-900 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}` }, label);
          const InputField = ({ placeholder, value, onChange, unit, half }) => h('div', { className: `relative ${half ? 'flex-1' : 'w-full'}` },
            h('input', { type: 'text', placeholder, value, onChange: e => onChange(e.target.value), className: 'w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-[13px] font-medium text-slate-700 outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-100 transition-all' }),
            unit ? h('span', { className: 'absolute right-4 top-1/2 -translate-y-1/2 text-[11px] text-slate-400 font-bold' }, unit) : null
          );

          return h('div', { className: 'pb-24 animate-fadeIn max-w-2xl mx-auto' },
            // Header
            h('div', { className: 'flex items-center gap-4 mb-8' },
              h('div', { className: 'w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center text-white text-2xl font-black' }, profile.gender === '남성' ? '👨' : profile.gender === '여성' ? '👩' : '👤'),
              h('div', null,
                h('h2', { className: 'text-2xl font-black text-slate-900' }, '내 스타일 프로필'),
                h('p', { className: 'text-slate-400 text-sm font-medium' }, 'AI가 더 정확하게 추천할 수 있도록 알려주세요')
              )
            ),
            h('div', { className: 'bg-white rounded-3xl border border-slate-200 p-8 shadow-sm' },
              // 기본 정보
              Section({ title: '기본 정보', children: h('div', { className: 'space-y-3' },
                // 성별
                h('div', { className: 'flex gap-2' },
                  ...['여성', '남성'].map(g => Chip({ label: g, selected: profile.gender === g, onClick: () => updateProfile('gender', g) }))
                ),
                // 키/나이
                h('div', { className: 'flex gap-3' },
                  InputField({ placeholder: '키', value: profile.height, onChange: v => updateProfile('height', v), unit: 'cm', half: true }),
                  InputField({ placeholder: '나이', value: profile.age, onChange: v => updateProfile('age', v), unit: '세', half: true })
                )
              )}),

              // 관심 브랜드
              Section({ title: '관심 브랜드', children: h('div', { className: 'flex gap-2 flex-wrap' },
                ...['SPAO', 'MIXXO', 'WHO.A.U', 'ROEM', 'New Balance', 'Zara', 'MATINKIM', 'Calvin Klein'].map(b =>
                  Chip({ label: b, selected: profile.brands.includes(b), onClick: () => toggleProfileArray('brands', b) })
                )
              )}),

              // 스타일
              Section({ title: '자주 입는 스타일', children: h('div', { className: 'flex gap-2 flex-wrap' },
                ...['캐주얼', '시크', '페미닌', '미니멀', '스트릿', '오피스', '스포티', '빈티지', '로맨틱', '모던'].map(s =>
                  Chip({ label: s, selected: profile.style.includes(s), onClick: () => toggleProfileArray('style', s) })
                )
              )}),

              // 퍼스널컬러
              Section({ title: '퍼스널 컬러', children: h('div', { className: 'flex gap-2 flex-wrap' },
                ...[ { label: '봄 웜', color: 'bg-orange-100 border-orange-300 text-orange-700' },
                     { label: '여름 쿨', color: 'bg-blue-100 border-blue-300 text-blue-700' },
                     { label: '가을 뮤트', color: 'bg-yellow-100 border-yellow-300 text-yellow-700' },
                     { label: '겨울 쿨', color: 'bg-slate-100 border-slate-300 text-slate-700' },
                     { label: '잘 모르겠어요', color: '' },
                ].map(pc =>
                  h('button', { key: pc.label, onClick: () => updateProfile('personalColor', pc.label),
                    className: `px-4 py-2 rounded-xl text-[12px] font-bold border transition-all ${profile.personalColor === pc.label ? (pc.color || 'bg-slate-900 text-white border-slate-900 shadow-md') : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`
                  }, pc.label)
                )
              )}),

              // 고민 부위
              Section({ title: '상체 고민', children: h('div', { className: 'flex gap-2 flex-wrap' },
                ...['좁은 어깨', '짧은 팔', '배가 나온 편', '얼굴 톤이 어두운 편편', '없음'].map(c =>
                  Chip({ label: c, selected: profile.upperConcern.includes(c), onClick: () => toggleProfileArray('upperConcern', c) })
                )
              )}),

              Section({ title: '하체 고민', children: h('div', { className: 'flex gap-2 flex-wrap' },
                ...['허벅지가 굵은 편', '허리가 긴 편', '엉덩이가 큰 편', 'O다리', '짧은 다리', '없음'].map(c =>
                  Chip({ label: c, selected: profile.lowerConcern.includes(c), onClick: () => toggleProfileArray('lowerConcern', c) })
                )
              )}),

              // 예산
              Section({ title: '예산 범위', children: h('div', { className: 'space-y-3' },
                h('div', { className: 'flex gap-3 items-center' },
                  InputField({ placeholder: '최소', value: profile.budgetMin, onChange: v => updateProfile('budgetMin', v), unit: '만원', half: true }),
                  h('span', { className: 'text-slate-300 font-bold' }, '~'),
                  InputField({ placeholder: '최대', value: profile.budgetMax, onChange: v => updateProfile('budgetMax', v), unit: '만원', half: true })
                ),
                h('div', { className: 'flex gap-2' },
                  ...['딱 맞는 예산만', '조금 초과해도 괜찮아요', '좋으면 예산 무관'].map(bf =>
                    Chip({ label: bf, selected: profile.budgetFlex === bf, onClick: () => updateProfile('budgetFlex', bf) })
                  )
                )
              )}),

              // Save button
              h('div', { className: 'mt-8 pt-6 border-t border-slate-100 flex items-center justify-between' },
                h('div', { className: 'text-[11px] text-slate-400' },
                  h('span', { className: 'text-violet-500 font-bold' }, '✨ AI 스타일리스트'),
                  ' 가 이 정보를 기반으로 추천합니다'
                ),
                h('button', { onClick: () => setView('FEED'), className: 'bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold text-sm hover:bg-black transition-all shadow-lg flex items-center gap-2' },
                  h(Sparkles, { size: 16 }), '프로필 저장'
                )
              )
            ),

            // Preview summary
            (profile.gender || profile.brands.length || profile.style.length) ? h('div', { className: 'mt-6 bg-violet-50 rounded-2xl p-6 border border-violet-100' },
              h('div', { className: 'flex items-center gap-2 mb-3' },
                h(Sparkles, { size: 14, className: 'text-violet-500' }),
                h('h4', { className: 'text-xs font-bold text-violet-700' }, 'AI가 이해한 내 스타일')
              ),
              h('p', { className: 'text-[12px] text-slate-600 leading-relaxed' },
                [
                  profile.gender && `${profile.gender}`,
                  profile.age && `${profile.age}세`,
                  profile.height && `${profile.height}cm`,
                  profile.bodyType,
                  profile.personalColor && profile.personalColor !== '잘 모르겠어요' && `${profile.personalColor} 톤`,
                  profile.style.length && `${profile.style.join(' · ')} 스타일 선호`,
                  profile.brands.length && `${profile.brands.join(', ')} 브랜드 관심`,
                  profile.budgetMax && `예산 ${profile.budgetMin || '0'}~${profile.budgetMax}만원${profile.budgetFlex === '조금 초과해도 괜찮아요' ? ' (유연)' : profile.budgetFlex === '좋으면 예산 무관' ? ' (무관)' : ''}`,
                ].filter(Boolean).join(' | ')
              )
            ) : null
          );
        })() : null,
        view === 'CHECKOUT' ? renderCheckout() : null
      )
    ),
    isDetailOpen && selectedProduct ? renderProductDetail() : null,
    isModalOpen && selectedProduct ? h(PriceTrackModal, { product: selectedProduct, onClose: () => setIsModalOpen(false), onStartTracking: handleStartTracking }) : null,
    isAuthModalOpen ? h('div', { className: 'fixed inset-0 z-[120] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4', onClick: closeAuthModal },
      h('div', { className: 'w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-2xl p-5 animate-fadeIn', onClick: e => e.stopPropagation() },
        h('div', { className: 'flex items-center justify-between mb-4' },
          h('h3', { className: 'text-2xl font-black text-slate-900' }, authMode === 'LOGIN' ? '로그인' : '회원가입'),
          h('button', { onClick: closeAuthModal, className: 'p-1 text-slate-400 hover:text-slate-700' }, h(X, { size: 18 }))
        ),
        h('div', { className: 'space-y-2' },
          h('input', {
            type: 'email',
            placeholder: '이메일',
            value: authEmail,
            onChange: e => setAuthEmail(e.target.value),
            className: 'w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-slate-400'
          }),
          h('input', {
            type: 'password',
            placeholder: '비밀번호',
            value: authPassword,
            onChange: e => setAuthPassword(e.target.value),
            className: 'w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-slate-400'
          })
        ),
        authMessage ? h('p', { className: 'text-red-500 text-sm mt-3' }, authMessage) : null,
        h('button', {
          onClick: authMode === 'LOGIN' ? handleLogin : handleSignup,
          disabled: authMode === 'LOGIN' && isLoginCompleting,
          className: `w-full mt-4 bg-slate-900 text-white rounded-lg py-2.5 font-bold transition-all ${(authMode === 'LOGIN' && isLoginCompleting) ? 'opacity-90 cursor-default' : 'hover:bg-black'}`
        }, authMode === 'LOGIN' ? (isLoginCompleting ? '로그인 완료' : '로그인') : '회원가입'),
        h('button', {
          onClick: () => setAuthMode(authMode === 'LOGIN' ? 'SIGNUP' : 'LOGIN'),
          className: 'w-full text-center text-sm text-slate-500 mt-3 hover:text-slate-800'
        }, authMode === 'LOGIN' ? '계정이 없으신가요? 회원가입' : '이미 계정이 있으신가요? 로그인')
      )
    ) : null,
    // Wishlist toast
    wishToast ? h('div', { className: 'fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] animate-fadeIn' },
      h('div', { className: 'bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3' },
        h(Heart, { size: 16, className: 'text-red-400', fill: 'currentColor' }),
        h('span', { className: 'text-sm font-bold' }, wishToast),
        h('span', { className: 'text-sm text-slate-400' }, 'AI 옷장에 추가됨')
      )
    ) : null
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
